<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>For You ❤️</title>
  <style>
    :root{
      --btn-w: 138px;
      --btn-h: 54px;
    }

    html, body { height: 100%; }
    body{
      margin:0;
      overflow:hidden;
      font-family: system-ui, -apple-system, "Noto Sans KR", Segoe UI, Roboto, sans-serif;
      background:url("background.jpg") center/cover no-repeat fixed;
      color:#fff;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; /* 화면 스크롤 방지(이 페이지 안에서) */
    }

    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.45);
    }

    .wrap{
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px;
      text-align:center;
    }

    .card{
      width:min(520px, 92vw);
      border-radius: 18px;
      padding: 26px 18px 18px;
      background: rgba(0,0,0,0.30);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    h1{
      margin:0 0 10px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: -0.2px;
    }

    p{
      margin:0 0 18px;
      opacity:0.92;
      line-height:1.5;
      font-size: 15px;
    }

    /* 버튼이 움직일 “경기장” */
    #arena{
      position: relative;
      width: 100%;
      height: 240px;
      border-radius: 16px;
    }

    button{
      width: var(--btn-w);
      height: var(--btn-h);
      border:0;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      user-select:none;
      -webkit-user-select:none;
      position:absolute;
    }

    #yes{
      background:#22c55e;
      color:#062d13;
    }

    #no{
      background:#ef4444;
      color:#3a0000;
    }

    .msg{
      margin-top: 14px;
      min-height: 54px;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.35;
      white-space: pre-line;
    }

    .small{
      font-size: 12px;
      opacity: 0.75;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="wrap">
    <div class="card">
      <h1>몬얼뚱의 사랑을 받으시겠습니까? ❤️</h1>
      <p>아래에서 선택해줘 :)</p>

      <div id="arena">
        <button id="yes" type="button">Yes</button>
        <button id="no" type="button">No</button>
      </div>

      <div class="msg" id="msg"></div>
      <div class="small">※ No는… 잡을 수 없을지도?</div>
    </div>
  </div>

  <script>
    const arena = document.getElementById("arena");
    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");
    const msg = document.getElementById("msg");

  </script>
</body>

</html>
